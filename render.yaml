# Render Blueprint Configuration
# This file defines the services for deploying to Render

services:
  # ===========================
  # BACKEND API SERVICE
  # ===========================
  - name: modern-shop-backend
    type: web
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ===========================
  # FRONTEND STATIC SITE
  # ===========================
  - name: modern-shop-frontend
    type: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://modern-shop-me53.onrender.com
      - key: REACT_APP_PAYSTACK_PUBLIC_KEY
        value: pk_test_232531a5c927ef2cc67ed1b85af3f26e3b8ed2f2
